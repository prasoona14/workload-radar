<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Workload Radar - Setup</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="container" style="display:flex; justify-content:center; align-items:center; height:95vh;">

        <div class="card" style="width:500px; text-align:center;">

            <h1>📊 Workload Radar</h1>
            <p style="color:#94a3b8;">
                Connect your Canvas calendar to generate personalized study plans.
            </p>

            <hr style="border:1px solid #334155; margin:20px 0;">

            <form method="post" action="/setup">

                <div style="text-align:left; margin-bottom:20px;">
                    <label>Canvas ICS Link</label><br><br>
                    <input type="text" name="canvasIcsUrl" required placeholder="Paste your Canvas ICS URL here..."
                        style="width:100%;" />
                </div>

                <button type="submit" class="btn" style="width:100%;">
                    🚀 Save & Sync Calendar
                </button>

            </form>

            <p style="margin-top:20px; font-size:13px; color:#64748b;">
                You can find your ICS link in Canvas → Calendar → Calendar Feed.
            </p>

        </div>

    </div>

</body>

</html>
