<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Workload Radar - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="container" style="display:flex; justify-content:center; align-items:center; height:95vh;">

        <div class="card" style="width:420px; text-align:center;">

            <h1>📊 Workload Radar</h1>
            <p style="color:#94a3b8;">Create your student account</p>

            <hr style="border:1px solid #334155; margin:20px 0;">

            <form th:action="@{/register}" method="post" th:object="${user}">

                <div style="margin-bottom:15px; text-align:left;">
                    <label>Name</label><br>
                    <input type="text" th:field="*{name}" required style="width:100%;" />
                </div>

                <div style="margin-bottom:15px; text-align:left;">
                    <label>Email</label><br>
                    <input type="email" th:field="*{email}" required style="width:100%;" />
                </div>

                <div style="margin-bottom:20px; text-align:left;">
                    <label>Password</label><br>
                    <input type="password" th:field="*{password}" required style="width:100%;" />
                </div>

                <button type="submit" class="btn" style="width:100%;">
                    Register
                </button>

            </form>

            <!-- Error Message -->
            <p th:if="${error}" th:text="${error}" style="margin-top:15px; color:#f87171; font-weight:bold;">
            </p>

            <p style="margin-top:20px; font-size:14px;">
                Already have an account?
                <a th:href="@{/login}" style="color:#38bdf8; text-decoration:none;">
                    Login
                </a>
            </p>

        </div>

    </div>

</body>

</html>
