<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Workload Radar - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="container">

        <h1>📊 Workload Radar</h1>

        <!-- Week Selector Card -->
        <div class="card">
            <form method="get" action="/dashboard">
                <label>Select Week:</label>
                <input type="date" name="date" th:value="${selectedDate}">
                <button type="submit" class="btn">View</button>
            </form>
        </div>

        <!-- Weekly Metrics Card -->
        <div class="card">
            <h2>Weekly Metrics</h2>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px;">

                <div>
                    <p>Workload Score</p>
                    <p class="metric" th:text="${metrics.workloadScore}"></p>
                </div>

                <div>
                    <p>Free Hours</p>
                    <p class="metric" th:text="${metrics.freeHours}"></p>
                </div>

                <div>
                    <p>Busiest Day</p>
                    <p class="metric" th:text="${metrics.busiestDay}"></p>
                </div>

                <div>
                    <p>Pressure Level</p>

                    <span th:text="${metrics.pressureLevel}" th:classappend="
                        ${metrics.pressureLevel == 'LOW'} ? 'badge low' :
                        (${metrics.pressureLevel == 'MEDIUM'} ? 'badge medium' :
                        'badge high')
                    ">
                    </span>

                </div>

            </div>
        </div>

        <!-- Events Card -->
        <div class="card">
            <h2>Events This Week</h2>

            <table>
                <tr>
                    <th>Title</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Type</th>
                </tr>
                <tr th:each="event : ${events}">
                    <td th:text="${event.title}"></td>
                    <td th:text="${event.startTime}"></td>
                    <td th:text="${event.endTime}"></td>
                    <td th:text="${event.type}"></td>
                </tr>
            </table>
        </div>

        <!-- AI Button Card -->
        <div class="card" style="text-align: center;">
            <a th:href="@{/plan(date=${selectedDate})}" class="btn">
                🤖 Generate AI Study Plan & Tips
            </a>
        </div>

    </div>

</body>

</html>
